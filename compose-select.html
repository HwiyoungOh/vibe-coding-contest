<style>
  .compose-page { padding: 28px 36px 40px; }
  .compose-breadcrumb { font-size: 13px; color: var(--text-tertiary); margin-bottom: 6px; }
  .compose-breadcrumb a { color: var(--text-tertiary); transition: color 0.15s; }
  .compose-breadcrumb a:hover { color: var(--hw-orange); }
  .compose-breadcrumb .sep { margin: 0 6px; }
  .compose-title {
    font-size: 22px; font-weight: 700; color: var(--text-primary);
    margin-bottom: 18px; letter-spacing: -0.5px;
  }

  .form-search {
    display: flex; align-items: center; gap: 10px;
    border: 1px solid var(--border-line); border-radius: 4px;
    padding: 0 14px; height: 38px; margin-bottom: 18px;
    background: #fff; transition: border-color 0.15s;
  }
  .form-search:focus-within { border-color: var(--hw-orange); }
  .form-search input {
    flex: 1; border: none; outline: none; font-size: 14px;
    font-family: inherit; color: var(--text-primary); background: transparent;
  }
  .form-search input::placeholder { color: var(--text-tertiary); }
  .form-search svg { color: var(--text-tertiary); flex-shrink: 0; }
  .form-search-clear {
    display: none; color: var(--text-tertiary); padding: 2px;
    font-size: 18px; line-height: 1; cursor: pointer;
  }
  .form-search-clear.visible { display: block; }
  .form-search-clear:hover { color: var(--text-primary); }

  .form-layout {
    display: grid; grid-template-columns: 240px 1fr; gap: 0;
    border: 1px solid var(--border-line); border-radius: 4px;
    background: #fff; min-height: 560px;
  }

  .form-tree {
    border-right: 1px solid var(--border-line);
    padding: 10px 0; background: #FAFAFA;
    overflow-y: auto; max-height: 720px;
  }
  .tree-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 16px; font-size: 13.5px; font-weight: 500;
    color: var(--text-menu); cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.1s, color 0.1s;
  }
  .tree-item:hover { background: #F2F2F2; }
  .tree-item.active {
    background: #fff;
    border-left-color: var(--hw-orange);
    color: var(--hw-orange);
    font-weight: 700;
  }
  .tree-item .count {
    font-size: 11px; font-weight: 500; color: var(--text-tertiary);
    background: #ECECEC; padding: 1px 7px; border-radius: 9px;
  }
  .tree-item.active .count { background: #FFE9D9; color: var(--hw-orange); }

  .form-list { padding: 18px 20px 24px; }
  .form-list-header {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 14px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border-light);
  }
  .form-list-cat { font-size: 16px; font-weight: 700; color: var(--text-primary); }
  .form-list-count { font-size: 12px; color: var(--text-tertiary); }

  .form-items {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 2px;
  }
  .form-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 4px;
    font-size: 13.5px; color: var(--text-primary);
    cursor: pointer; transition: background 0.1s;
    text-decoration: none;
  }
  .form-item:hover { background: #FFF6EE; }
  .form-icon {
    width: 6px; height: 6px; border-radius: 50%;
    background: #CCC; flex-shrink: 0;
  }
  .form-item:hover .form-icon { background: var(--hw-orange); }
  .form-item .form-name { flex: 1; }
  .form-item.featured {
    background: linear-gradient(90deg, #FFF6EE 0%, transparent 100%);
    font-weight: 600;
  }
  .form-item.featured .form-icon { background: var(--hw-orange); }
  .form-item.featured:hover { background: #FFE9D9; }
  .badge-jigi {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--hw-orange); color: #fff;
    font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 3px; letter-spacing: -0.2px;
  }
  .badge-jigi::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%; background: #fff;
  }

  .form-subgroup {
    font-size: 12px; font-weight: 700;
    color: var(--text-tertiary);
    grid-column: 1 / -1;
    padding: 12px 4px 4px;
  }
  .form-subgroup:first-child { padding-top: 4px; }

  .search-result-header {
    font-size: 13px; color: var(--text-secondary); margin-bottom: 12px;
  }
  .search-result-header strong { color: var(--hw-orange); font-weight: 700; }
  .search-empty {
    padding: 40px 0; text-align: center;
    color: var(--text-tertiary); font-size: 13px;
  }
  mark {
    background: #FFE9D9; color: var(--hw-orange);
    padding: 0 2px; border-radius: 2px; font-weight: 700;
  }
</style>

    '시스템 작업 결과보고서',
    '시스템 작업 계획보고서',
    '배치작업 오류/재수행 일간 현황보고',
    '네트워크 보안 일지', '네트워크 운영일지',
    '일일보안점검일지', '월간보안점검',
    '외주인력 업무개시 신청서',
    '외주인력 철수확인서',
    '모의해킹 결과 조치 요청서',
    'PC공용계정 생성/변경 요청서',
    '문서보안 해제 신청서',
    'IT투자위원회 심의 의결서',
    '한화캐롯손해보험 테라 운영계 권한 요청서',
  ]},
  { id: 'siu', name: 'SIU', items: [
    '보험범죄방지위원회 의사록',
  ]},
];

function countItems(cat) {
  if (cat.items) return cat.items.length;
  if (cat.groups) return cat.groups.reduce((s, g) => s + g.items.length, 0);
  return 0;
}

function renderTree(activeId) {
  const tree = document.getElementById('tree');
  tree.innerHTML = CATEGORIES.map(cat => `
    <div class="tree-item ${cat.id === activeId ? 'active' : ''}" data-id="${cat.id}">
      <span>${cat.name}</span>
      <span class="count">${countItems(cat)}</span>
    </div>
  `).join('');
  tree.querySelectorAll('.tree-item').forEach(el => {
    el.addEventListener('click', () => selectCategory(el.dataset.id));
  });
}

function renderItem(it) {
  const href = it.target ? `href="${it.target}"` : 'href="javascript:void(0)"';
  const nudge = it.target ? `<span class="nudge nudge-left" style="left: calc(100% + 16px); top: 50%; margin-top: -14px;">이 양식을 눌러주세요</span>` : '';
  return `
    <a class="form-item" ${href} style="position: relative;">
      <span class="form-icon"></span>
      <span class="form-name">${escapeHtml(it.name)}</span>
      ${nudge}
    </a>
  `;
}

function renderList(catId) {
  const cat = CATEGORIES.find(c => c.id === catId);
  const list = document.getElementById('list');
  let html = `
    <div class="form-list-header">
      <div class="form-list-cat">${cat.name}</div>
      <div class="form-list-count">${countItems(cat)}개 양식</div>
    </div>
    <div class="form-items">
  `;
  if (cat.groups) {
    cat.groups.forEach(g => {
      html += `<div class="form-subgroup">${g.title}</div>`;
      g.items.forEach(it => { html += renderItem(it); });
    });
  } else {
    cat.items.forEach(it => {
      html += renderItem(typeof it === 'string' ? { name: it } : it);
    });
  }
  html += `</div>`;
  list.innerHTML = html;
}

let currentCat = 'general';
function selectCategory(id) {
  currentCat = id;
  renderTree(id);
  renderList(id);
  document.querySelector('.form-list').scrollTop = 0;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function highlight(text, q) {
  const safe = escapeHtml(text);
  if (!q) return safe;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return safe.replace(re, '<mark>$1</mark>');
}

function flattenAll() {
  const all = [];
  CATEGORIES.forEach(cat => {
    if (cat.groups) {
      cat.groups.forEach(g => g.items.forEach(it => {
        all.push({ name: it.name, featured: it.featured, target: it.target, catName: cat.name, group: g.title });
      }));
    } else {
      cat.items.forEach(it => {
        const obj = typeof it === 'string' ? { name: it } : it;
        all.push({ ...obj, catName: cat.name });
      });
    }
  });
  return all;
}

function renderSearchResults(q) {
  const list = document.getElementById('list');
  const results = flattenAll().filter(it => it.name.toLowerCase().includes(q.toLowerCase()));

  let html = `
    <div class="search-result-header">
      "<strong>${escapeHtml(q)}</strong>" 검색결과 ${results.length}건
    </div>
  `;

  if (results.length === 0) {
    html += `<div class="search-empty">일치하는 양식이 없습니다.</div>`;
  } else {
    html += `<div class="form-items">`;
    results.forEach(it => {
      const href = it.target ? `href="${it.target}"` : 'href="javascript:void(0)"';
      html += `
        <a class="form-item" ${href}>
          <span class="form-icon"></span>
          <span class="form-name">${highlight(it.name, q)} <span style="color:var(--text-tertiary);font-size:11px;font-weight:400;margin-left:4px;">${escapeHtml(it.catName)}${it.group ? ' › ' + escapeHtml(it.group) : ''}</span></span>
        </a>
      `;
    });
    html += `</div>`;
  }
  list.innerHTML = html;
}

const searchInput = document.getElementById('search');
const searchClear = document.getElementById('searchClear');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  searchClear.classList.toggle('visible', q.length > 0);
  if (q.length === 0) renderList(currentCat);
  else renderSearchResults(q);
});
searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.classList.remove('visible');
  renderList(currentCat);
  searchInput.focus();
});

renderTree(currentCat);
renderList(currentCat);
</script>

</body>
</html>
