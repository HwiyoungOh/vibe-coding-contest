<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전자결재 - 한화손보 CIRCLE</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="gw-header">
  <div class="gw-header-top">
    <div class="gw-logo">한화손보 <span class="brand-dot">CIRCLE</span></div>
    <div class="gw-user">
      <div class="gw-user-avatar">오</div>
      <div>
        <div class="gw-user-name">오휘영</div>
        <div class="gw-user-team">DX기획파트</div>
      </div>
    </div>
  </div>
  <nav class="gw-nav">
    <div class="gw-nav-item">메일</div>
    <div class="gw-nav-item">워크플레이스</div>
    <div class="gw-nav-item active">전자결재</div>
    <div class="gw-nav-item">게시판</div>
    <div class="gw-nav-item">지원업무</div>
    <div class="gw-nav-item">채널Hplus</div>
    <div class="gw-nav-item">업무공유</div>
  </nav>
</header>

<div class="gw-body">
  <aside class="gw-sidebar">
    <div class="gw-compose-wrap">
      <div class="nudge nudge-down" style="left: 50%; transform: translateX(-50%); top: -38px;">이 버튼을 눌러주세요</div>
      <a href="compose-select.html" class="gw-compose-btn">결재 작성하기</a>
    </div>

    <div class="gw-side-group">
      <div class="gw-side-title">결재함</div>
      <div class="gw-side-item">결재할문서</div>
      <div class="gw-side-item">일괄결재함</div>
      <div class="gw-side-item">진행문서</div>
    </div>

    <div class="gw-side-group">
      <div class="gw-side-title">완료함</div>
      <div class="gw-side-item">승인문서</div>
      <div class="gw-side-item">반려문서</div>
    </div>

    <div class="gw-side-group">
      <div class="gw-side-title">수신/발신함</div>
      <div class="gw-side-item">대내문서(수/발)</div>
      <div class="gw-side-item">대내수신</div>
      <div class="gw-side-item">대내발신</div>
      <div class="gw-side-item">참조문서</div>
      <div class="gw-side-item">진행중 참조문서</div>
    </div>

    <div class="gw-side-group">
      <div class="gw-side-title">개인함</div>
      <div class="gw-side-item">기안문서</div>
      <div class="gw-side-item">최근열람문서</div>
    </div>

    <div class="gw-side-group">
      <div class="gw-side-title">부서공용함</div>
      <div class="gw-side-item">전체문서</div>
      <div class="gw-side-item">기안문서</div>
      <div class="gw-side-item">협조문서</div>
      <div class="gw-side-item">수신문서</div>
    </div>
  </aside>

  <main class="gw-main">
    <div class="gw-empty">
      <svg class="gw-empty-icon" viewBox="0 0 64 64" fill="none">
        <rect x="12" y="14" width="40" height="42" rx="3" stroke="currentColor" stroke-width="2.5"/>
        <line x1="20" y1="26" x2="44" y2="26" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="20" y1="34" x2="44" y2="34" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="20" y1="42" x2="36" y2="42" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <div class="gw-empty-text">좌측 메뉴에서 결재함을 선택하거나</div>
      <div class="gw-empty-sub">[결재 작성하기]를 눌러 새 문서를 작성하세요.</div>
    </div>
  </main>
</div>

<script>
// 상신 완료 후 진입 시 알림
(function(){
  const params = new URLSearchParams(location.search);
  if (params.get('submitted') === '1') {
    setTimeout(() => alert('문서가 정상적으로 상신되었어요.'), 200);
    // 주소창에서 파라미터 정리
    history.replaceState(null, '', location.pathname);
  }
})();
</script>
</body>
</html>
